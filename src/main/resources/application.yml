server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/training_board?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 121687
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: online.linhaochen.trainingboard.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    online.linhaochen.trainingboard: DEBUG
